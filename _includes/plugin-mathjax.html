<!-- MathJax数学公式支持 -->
<style>
  .has-jax {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    background-color: transparent !important;
    line-height: normal !important;
    word-break: normal !important;
    padding: 0 !important;
    margin: 0 !important;
  }
  .has-jax * {
    outline: 0;
  }
</style>

<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
      tex2jax: {
          inlineMath: [
              ['$', '$'],
              ['\\(', '\\)']
          ],
          displayMath: [
              ['$$', '$$'],
              ["\\[", "\\]"]
          ],
          processEscapes: true
      },
      TeX: {
          extensions: ["AMSmath.js", "AMSsymbols.js"],
          equationNumbers: {
              autoNumber: ["AMS"],
              useLabelIds: true
          },
          Macros: {
              hfill: "{}"
          }
      },
      "HTML-CSS": {
          linebreaks: {
              automatic: true
          },
          availableFonts: ["TeX"],
          scale: 110
      },
      SVG: {
          linebreaks: {
              automatic: true
          }
      }
  });
</script>
<script type="text/javascript" src="https://c328740.ssl.cf1.rackcdn.com/mathjax/latest/MathJax.js?config=TeX-AMS-MML_HTMLorMML">
  
</script>
